<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - OpsCasei</title>
  <link rel="icon" href="img/iconnnn.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
   

    <section class="login-card" aria-labelledby="login-title">
      <h1 class="visually-hidden" id="login-title">Entrar na sua conta</h1>
      <a class="login-card-logo" href="index.html" aria-label="OpsCasei">
        <img class="brand-symbol" src="img/opslogo.png" alt="OpsCasei">
      </a>
      <span class="login-eyebrow">Area dos noivos</span>
      <p>Acesse seu site, lista de presentes e confirmacoes em um so lugar.</p>

      <div class="social-login" aria-label="Login social">
        <button class="social-button" type="button" data-provider="google">
          <span class="social-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.37c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.08 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06L5.84 9.9C6.71 7.3 9.14 5.37 12 5.37z"/>
            </svg>
          </span>
          Entrar com Google
        </button>
        <button class="social-button" type="button" data-provider="facebook">
          <span class="social-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path fill="#1877F2" d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.09 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.96h-1.51c-1.49 0-1.96.93-1.96 1.89v2.26h3.33l-.53 3.49h-2.8V24C19.61 23.09 24 18.1 24 12.07z"/>
              <path fill="#FFFFFF" d="M16.67 15.56l.53-3.49h-3.33V9.81c0-.96.47-1.89 1.96-1.89h1.51V4.96s-1.37-.24-2.68-.24c-2.74 0-4.53 1.67-4.53 4.69v2.66H7.08v3.49h3.05V24c.61.1 1.24.15 1.87.15s1.26-.05 1.87-.15v-8.44h2.8z"/>
            </svg>
          </span>
          Facebook
        </button>
        <button class="social-button" type="button" data-provider="apple">
          <span class="social-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path fill="#111111" d="M16.37 1.13c0 1.19-.44 2.28-1.18 3.12-.78.89-2.04 1.57-3.24 1.48-.15-1.14.42-2.35 1.1-3.09.77-.85 2.1-1.48 3.32-1.51zM20.49 17.44c-.45 1.03-.66 1.49-1.24 2.4-.81 1.25-1.95 2.81-3.37 2.82-1.26.01-1.58-.82-3.29-.81-1.7.01-2.06.83-3.32.82-1.42-.01-2.5-1.42-3.31-2.67-2.27-3.49-2.51-7.59-1.11-9.77.99-1.55 2.56-2.45 4.04-2.45 1.5 0 2.45.83 3.69.83 1.2 0 1.93-.84 3.66-.84 1.31 0 2.7.72 3.69 1.96-3.24 1.79-2.71 6.44.56 7.71z"/>
            </svg>
          </span>
          Apple
        </button>
      </div>

      <div class="login-divider"><span>ou</span></div>

      <form class="login-form" id="login-form">
        <label class="input-group">
          <span>E-mail</span>
          <span class="input-shell">
            <span class="input-icon" aria-hidden="true">@</span>
            <input name="email" type="email" autocomplete="email" placeholder="seuemail@exemplo.com" required>
          </span>
        </label>

        <label class="input-group">
          <span>Senha</span>
          <span class="input-shell">
            <span class="input-icon" aria-hidden="true">*</span>
            <input name="password" type="password" autocomplete="current-password" placeholder="Digite sua senha" required>
          </span>
        </label>

        <div class="login-options">
          <label class="remember-login">
            <input name="remember" type="checkbox" checked>
            <span>Manter login ativo</span>
          </label>
          <a href="#recuperar" id="forgot-password">Esqueci minha senha</a>
        </div>

        <button class="button button-primary login-submit" type="submit">Entrar</button>
        <p class="login-feedback" id="login-feedback" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
